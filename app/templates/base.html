<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComplianceIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center">
        <span class="text-xl font-bold text-yellow-400">ComplianceIQ</span>
        {% if current_user.is_authenticated %}
        <div class="flex gap-4 items-center">
            <span class="text-sm text-gray-400">{{ current_user.company_name }}</span>
            <a href="{{ url_for('auth.logout') }}" class="text-sm text-yellow-400 hover:underline">Logout</a>
        </div>
        {% endif %}
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            {% for message in messages %}<p>{{ message }}</p>{% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
