{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-8 mt-10">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Create Account</h2>
    <p class="text-gray-500 mb-6 text-sm">Register your organisation to begin the assessment</p>
    <form method="POST">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
            <input type="text" name="company_name" required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Industry</label>
            <select name="industry"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
                <option>Healthcare</option>
                <option>Finance & Banking</option>
                <option>Retail & E-commerce</option>
                <option>Technology & SaaS</option>
                <option>Education</option>
                <option>Manufacturing</option>
                <option>Other</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Business Size</label>
            <select name="business_size"
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
                <option>1-10 employees</option>
                <option>11-50 employees</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required
                class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-yellow-400">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <div class="relative">
                <input type="password" name="password" id="reg-password" required
                    class="w-full border border-gray-300 rounded px-3 py-2 text-sm pr-10 focus:outline-none focus:border-yellow-400">
                <button type="button" onclick="togglePassword('reg-password')"
                    class="absolute right-3 top-2 text-gray-400 hover:text-gray-600 text-sm">
                    <span id="reg-eye">👁</span>
                </button>
            </div>
        </div>
        <p class="text-xs text-gray-400 mb-4 text-center">
            Your data is stored securely and used only for your compliance assessment.
            ComplianceIQ does not share your information with third parties.
        </p>
        <button type="submit"
            class="w-full bg-yellow-400 text-gray-900 font-bold py-2 rounded hover:bg-yellow-500">
            Create Account
        </button>
    </form>
    <p class="text-sm text-center mt-4 text-gray-500">
        Already registered?
        <a href="{{ url_for('auth.login') }}" class="text-yellow-500 font-medium">Sign in</a>
    </p>
</div>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    field.type = field.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
