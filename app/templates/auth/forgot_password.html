{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-8 mt-10">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Reset Password</h2>
    <p class="text-gray-500 text-sm mb-6">Password reset via email is planned for the next phase of development. Please contact your administrator to reset your password manually.</p>
    <a href="{{ url_for('auth.login') }}" class="inline-block bg-yellow-400 text-gray-900 font-bold px-6 py-2 rounded hover:bg-yellow-500">Back to Login</a>
</div>
{% endblock %}
